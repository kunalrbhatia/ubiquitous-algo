name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier Check
        run: pnpm run format:check

      - name: Run ESLint
        run: pnpm run lint

      - name: Run Typecheck
        run: pnpm exec tsc --noEmit

      - name: Run Jest Tests (100% Coverage)
        run: pnpm run test
        env:
          NODE_ENV: test

      - name: Build Project
        run: pnpm run build
